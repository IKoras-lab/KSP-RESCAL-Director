<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>KSP Resonant Orbit Director [Beta v8.1]</title>
    <style>
        :root {
            --bg-main: #0b0e14; --bg-panel: #161b22; --border-color: #30363d;
            --accent-blue: #58a6ff; --accent-green: #3fb950; --accent-red: #f85149;
            --text-main: #c9d1d9; --text-muted: #8b949e; --highlight: #f2cc60;
        }
        
        /* 1. WIDEN & TRANSLATE PANELS / 2. FILL SCREEN SPACE */
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; background: var(--bg-main); color: var(--text-main); padding: 20px; font-size: 13px; line-height: 1.5; min-height: 100vh; box-sizing: border-box; margin: 0; }
        .master-container { max-width: 96vw; margin: 0 auto; display: grid; grid-template-columns: 420px 1fr 420px; gap: 20px; min-height: calc(100vh - 40px); }
        .panel { background: var(--bg-panel); border: 1px solid var(--border-color); border-radius: 8px; padding: 20px; box-shadow: 0 8px 24px rgba(0,0,0,0.5); display: flex; flex-direction: column; }
        
        .ref-panel { display: flex; flex-direction: column; gap: 20px; }
        .ref-panel .panel { flex: 1; } /* Forces Ref A and B to stretch and share vertical space evenly */
        
        h2 { color: var(--accent-blue); font-size: 1.1rem; border-bottom: 1px solid var(--border-color); padding-bottom: 10px; margin-top: 0; text-transform: uppercase; letter-spacing: 1px; }
        .control-group { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 15px; }
        .orbit-row { display: grid; grid-template-columns: 1fr 0.6fr 1fr; gap: 12px; margin-bottom: 15px; align-items: end; }
        label { display: block; color: var(--text-muted); font-size: 10px; text-transform: uppercase; margin-bottom: 5px; font-weight: 600; }
        select, input { width: 100%; background: var(--bg-main); border: 1px solid var(--border-color); color: var(--text-main); padding: 10px; border-radius: 4px; box-sizing: border-box; transition: border 0.2s; }
        select:focus, input:focus { border-color: var(--accent-blue); outline: none; }
        
        .toggle-group { display: flex; background: var(--bg-main); padding: 3px; border: 1px solid var(--border-color); border-radius: 6px; margin-bottom: 15px; }
        .toggle-btn { flex: 1; padding: 8px; text-align: center; cursor: pointer; font-size: 10px; border-radius: 4px; color: var(--text-muted); font-weight: bold; text-transform: uppercase; }
        .toggle-btn.active { background: var(--accent-blue); color: white; }
        .toggle-btn.mod-active { background: var(--accent-green); color: white; }
        
        /* Flexes the deployment results so it pushes the update button to the absolute bottom of the left column */
        .results { background: #0d1117; border-radius: 6px; padding: 15px; margin-top: 15px; border-left: 4px solid var(--accent-green); flex: 1; }
        .ref-row { display: flex; justify-content: space-between; margin-bottom: 8px; border-bottom: 1px dashed #30363d; padding-bottom: 4px; }
        .highlight { color: var(--highlight); font-family: "SFMono-Regular", Consolas, monospace; font-weight: bold; }
        .section-header { font-size: 10px; color: var(--accent-blue); margin: 20px 0 10px 0; text-transform: uppercase; font-weight: 800; border-bottom: 1px solid #30363d; padding-bottom: 3px;}
        
        /* Forces the canvas wrapper to fill all available vertical space left over by the top controls */
        .canvas-container { background: #000; border-radius: 6px; padding: 15px; display: flex; justify-content: center; align-items: center; border: 1px solid var(--border-color); flex: 1; min-height: 400px; margin-top: auto; }
        .update-btn { width: 100%; padding: 12px; background: var(--accent-blue); border: none; border-radius: 4px; color: white; font-weight: bold; text-transform: uppercase; cursor: pointer; margin-top: 15px; }
        .update-btn:hover { background: #478edb; }
    </style>
</head>
<body>

<div class="master-container">
    <div class="panel">
        <h2>⌖ Parent Body Info</h2>
        <label>Select Parent Body</label>
        <select id="parentSelect" onchange="renderInfo('parent'); calculate();" style="margin-bottom: 15px;"></select>
        <div id="parentRef"></div>

        <div id="calcResults" class="results"></div>
        <button class="update-btn" onclick="calculate()">⟳ Update Calculation</button>
    </div>

    <div class="panel">
        <h2>✦ Resonant Orbit Calculator</h2>
        <div class="toggle-group">
            <div class="toggle-btn mod-active" id="mod-stock">Stock</div>
            <div class="toggle-btn" id="mod-opm" onclick="toggleMod('opm')">Outer Planets</div>
            <div class="toggle-btn" id="mod-kcal" onclick="toggleMod('kcal')">Kcalbeloh</div>
        </div>

        <div class="control-group">
            <div><label>Scale</label><select id="scaleSelect" onchange="updateAll()">
                <option value="1">Stock (1x)</option><option value="2.5">JNSQ (2.5x)</option><option value="10">RSS (10x)</option>
            </select></div>
            <div><label>Units</label><select id="unitSelect" onchange="updateAll()">
                <option value="1">m</option><option value="1000" selected>km</option><option value="1000000">Mm</option>
            </select></div>
            <div><label>Vessel Ant (Mm)</label><input type="number" id="antVessel" value="5" oninput="calculate()"></div>
            <div><label>DSN Level</label><select id="antDSN" onchange="calculate()">
                <option value="2000000000">L1 (2 Gm)</option>
                <option value="50000000000">L2 (50 Gm)</option>
                <option value="250000000000" selected>L3 (250 Gm)</option>
            </select></div>
        </div>

        <label>Datum Reference</label>
        <div class="toggle-group">
            <div class="toggle-btn active" id="datum-asl" onclick="setDatum('asl')">ASL (Altitude)</div>
            <div class="toggle-btn" id="datum-cog" onclick="setDatum('cog')">CoG (Radius)</div>
        </div>

        <div class="orbit-row">
            <div><label id="apLabel">Target Ap (Alt)</label><input type="number" id="apIn" value="2863.33" oninput="calculate()"></div>
            <div><label>Sat Count</label><input type="number" id="vessels" value="3" oninput="calculate()"></div>
            <div><label id="peLabel">Target Pe (Alt)</label><input type="number" id="peIn" value="2863.33" oninput="calculate()"></div>
        </div>

        <div style="margin-bottom: 20px;">
            <label>Maneuver Logic</label>
            <select id="manType" onchange="calculate()">
                <option value="dive">Resonant Dive (Lower PE to Deploy)</option>
                <option value="soar">Resonant Soar (Raise AP to Deploy)</option>
            </select>
        </div>

        <div class="canvas-container">
            <canvas id="orbitCanvas" width="650" height="650" style="max-width: 100%; height: auto; max-height: 100%; object-fit: contain;"></canvas>
        </div>
    </div>

    <div class="ref-panel">
        <div class="panel">
            <h2>⌖ Ref Body A</h2>
            <select id="targetASelect" onchange="renderInfo('targetA');" style="margin-bottom: 10px;"></select>
            <div id="targetARef"></div>
        </div>
        <div class="panel">
            <h2>⌖ Ref Body B</h2>
            <select id="targetBSelect" onchange="renderInfo('targetB');" style="margin-bottom: 10px;"></select>
            <div id="targetBRef"></div>
        </div>
    </div>
</div>

function toggleMod(mod) {
    activeMods[mod] = !activeMods[mod];
    document.getElementById(`mod-${mod}`).classList.toggle('mod-active');
    updateAll();
}

function setDatum(mode) {
    currentDatum = mode;
    document.getElementById('datum-asl').classList.toggle('active', mode === 'asl');
    document.getElementById('datum-cog').classList.toggle('active', mode === 'cog');
    document.getElementById('apLabel').innerText = mode === 'asl' ? 'Target Ap (Alt)' : 'Target Ap (Radius)';
    document.getElementById('peLabel').innerText = mode === 'asl' ? 'Target Pe (Alt)' : 'Target Pe (Radius)';
    updateAll();
}

function updateAll() {
    const selects = ['parentSelect', 'targetASelect', 'targetBSelect'];
    const currentVals = selects.map(id => document.getElementById(id).value);
    
    // UI Unit Sync Logic
    const newUD = parseFloat(document.getElementById('unitSelect').value);
    const ratio = lastUD / newUD;
    const apIn = document.getElementById('apIn');
    const peIn = document.getElementById('peIn');
    
    if (apIn.value) apIn.value = (parseFloat(apIn.value) * ratio).toFixed(2);
    if (peIn.value) peIn.value = (parseFloat(peIn.value) * ratio).toFixed(2);
    lastUD = newUD;

    selects.forEach(id => {
        const sel = document.getElementById(id);
        sel.innerHTML = '';
        const categories = ['stock', ...(activeMods.opm ? ['opm'] : []), ...(activeMods.kcal ? ['kcal'] : [])];

        categories.forEach(cat => {
            for (const grp in bodyData[cat]) {
                const optGroup = document.createElement('optgroup');
                optGroup.label = `${cat.toUpperCase()} - ${grp}`;
                for (const body in bodyData[cat][grp]) { optGroup.appendChild(new Option(body, body)); }
                sel.appendChild(optGroup);
            }
        });
    });

    document.getElementById('parentSelect').value = currentVals[0] || "Kerbin";
    document.getElementById('targetASelect').value = currentVals[1] || "Mun";
    document.getElementById('targetBSelect').value = currentVals[2] || "Minmus";
    
    renderInfo('parent'); renderInfo('targetA'); renderInfo('targetB'); calculate();
}

function getBody(name) {
    for (const cat in bodyData) {
        for (const grp in bodyData[cat]) { if (bodyData[cat][grp][name]) return bodyData[cat][grp][name]; }
    }
    return null;
}

function formatDist(m, uD) {
    if (m === 0) return "0.00 " + (uD == 1 ? "m" : (uD == 1000 ? "km" : "Mm"));
    if (Math.abs(m) > 1e9 && uD >= 1000) return (m / 1e9).toLocaleString(undefined, {minimumFractionDigits: 3, maximumFractionDigits: 3}) + ' Gm';
    const val = m / uD;
    const unit = uD == 1 ? "m" : (uD == 1000 ? "km" : "Mm");
    return val.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2}) + ' ' + unit;
}

function renderInfo(type) {
    const b = getBody(document.getElementById(type + 'Select').value);
    const scale = parseFloat(document.getElementById('scaleSelect').value);
    const uD = parseFloat(document.getElementById('unitSelect').value);
    if (!b) return;

    const parentB = getBody(document.getElementById('parentSelect').value);
    const parentR = parentB ? parentB.r * scale : 0;

    const r = b.r * scale, mu = b.mu * scale, soi = b.soi * scale;
    const ecc = (b.ap + b.pe) > 0 ? (b.ap - b.pe) / (b.ap + b.pe) : 0;
    
    // Sync Alt Datum Logic
    const syncRadius = Math.pow(mu * Math.pow(b.p / (2 * Math.PI), 2), 1/3);
    const syncDisp = currentDatum === 'asl' ? syncRadius - r : syncRadius;
    
    // Velocity Math
    const vEscape = Math.sqrt((2 * mu) / r);
    const vOrbit = Math.sqrt(mu / r);
    
    const orbitDtm = (type === 'parent') ? (currentDatum === 'asl' ? r : 0) : (currentDatum === 'asl' ? parentR : 0);

    document.getElementById(type + 'Ref').innerHTML = `
        <div class="ref-row"><span>Radius</span><span class="highlight">${formatDist(r, uD)}</span></div>
        <div class="ref-row"><span>Mu (μ)</span><span class="highlight">${mu.toExponential(4)}</span></div>
        <div class="ref-row"><span>Rotation</span><span class="highlight">${formatT(b.p)}</span></div>
        <div class="ref-row"><span>SOI Radius</span><span class="highlight">${formatDist(soi, uD)}</span></div>
        <div class="ref-row"><span>Sync Alt</span><span class="highlight">${syncRadius > r ? formatDist(syncDisp, uD) : 'N/A'}</span></div>
        <div class="section-header">Orbital Parameters</div>
        <div class="ref-row"><span>Apoapsis</span><span class="highlight">${formatDist((b.ap * scale) - orbitDtm, uD)}</span></div>
        <div class="ref-row"><span>Periapsis</span><span class="highlight">${formatDist((b.pe * scale) - orbitDtm, uD)}</span></div>
        <div class="ref-row"><span>Eccentricity</span><span class="highlight">${ecc.toFixed(4)}</span></div>
        <div class="ref-row"><span>Inclination</span><span class="highlight">${b.inc.toFixed(2)}°</span></div>
        <div class="ref-row"><span>Atmosphere</span><span class="highlight">${b.atmo > 0 ? formatDist(b.atmo * scale, uD) : 'None'}</span></div>
        <div class="section-header">Surface Physics</div>
        <div class="ref-row"><span>Escape Velocity</span><span class="highlight">${vEscape.toFixed(2)} m/s</span></div>
        <div class="ref-row"><span>Orbital Speed</span><span class="highlight">${vOrbit.toFixed(2)} m/s</span></div>
    `;
}

function calculate() {
    const name = document.getElementById('parentSelect').value;
    const b = getBody(name);
    if (!b) return;

    const scale = parseFloat(document.getElementById('scaleSelect').value);
    const uD = parseFloat(document.getElementById('unitSelect').value);
    const r = b.r * scale, mu = b.mu * scale;
    const manType = document.getElementById('manType').value;
    const s = parseInt(document.getElementById('vessels').value) || 1;
    
    let ap = parseFloat(document.getElementById('apIn').value) * uD;
    let pe = parseFloat(document.getElementById('peIn').value) * uD;
    if (currentDatum === 'asl') { ap += r; pe += r; }

    const smaT = (ap + pe) / 2;
    const pT = 2 * Math.PI * Math.sqrt(Math.pow(smaT, 3) / mu);
    const pR = pT * ((manType === 'dive') ? (s - 1) / s : (s + 1) / s);
    const smaR = Math.pow(mu * Math.pow(pR / (2 * Math.PI), 2), 1 / 3);
    
    let resAp, resPe;
    if (manType === 'dive') { resAp = ap; resPe = (2 * smaR) - ap; } 
    else { resPe = pe; resAp = (2 * smaR) - pe; }

    const dtm = currentDatum === 'asl' ? r : 0;
    const antV = (parseFloat(document.getElementById('antVessel').value) || 0) * 1e6;
    const antD = parseFloat(document.getElementById('antDSN').value) || 0;
    const chord = 2 * smaT * Math.sin(Math.PI / s);

    document.getElementById('calcResults').innerHTML = `
        <div class="section-header">Deployment Results</div>
        <div class="ref-row"><span>Target Period</span><span class="highlight">${formatT(pT)}</span></div>
        <div class="ref-row"><span>Target Ap</span><span class="highlight">${formatDist(ap - dtm, uD)}</span></div>
        <div class="ref-row"><span>Target Pe</span><span class="highlight">${formatDist(pe - dtm, uD)}</span></div>
        <div class="section-header" style="color:var(--accent-green)">Flight Computer</div>
        <div class="ref-row"><span>Resonant Period</span><span class="highlight">${formatT(pR)}</span></div>
        <div class="ref-row"><span>Resonant Ap</span><span class="highlight">${formatDist(resAp - dtm, uD)}</span></div>
        <div class="ref-row"><span>Resonant Pe</span><span class="highlight">${formatDist(resPe - dtm, uD)}</span></div>
        <div class="section-header">Comms (30% Strength)</div>
        <div class="ref-row"><span>Inter-Sat Dist</span><span class="highlight">${formatDist(chord, uD)}</span></div>
        <div class="ref-row"><span>Safe (V-V)</span><span class="highlight">${formatDist(0.64 * antV, uD)}</span></div>
        <div class="ref-row"><span>Safe (DSN)</span><span class="highlight">${formatDist(0.64 * Math.sqrt(antV * antD), uD)}</span></div>
    `;

    drawOrbitDiagram(r, smaT, resAp, resPe, (b.atmo || 0) * scale, s);
}

function drawOrbitDiagram(radius, smaT, resAp, resPe, atmoHeight, s) {
    const canvas = document.getElementById('orbitCanvas');
    const ctx = canvas.getContext('2d');
    const cX = canvas.width / 2, cY = canvas.height / 2;
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    const maxExtent = Math.max(smaT, resAp, resPe);
    const drawScale = (canvas.width / 2 * 0.88) / maxExtent;

    // Body & Atmo
    ctx.beginPath(); ctx.setLineDash([5, 5]); ctx.strokeStyle = 'rgba(248, 81, 73, 0.4)';
    ctx.arc(cX, cY, (radius + atmoHeight) * drawScale, 0, Math.PI * 2); ctx.stroke();
    ctx.setLineDash([]); ctx.beginPath(); ctx.fillStyle = '#58a6ff';
    ctx.arc(cX, cY, radius * drawScale, 0, Math.PI * 2); ctx.fill();

    // Orbits
    ctx.beginPath(); ctx.strokeStyle = '#30363d'; ctx.arc(cX, cY, smaT * drawScale, 0, Math.PI * 2); ctx.stroke();
    const resSMA = (resAp + resPe) / 2, ecc = Math.abs(resAp - resPe) / (resAp + resPe);
    const fOffset = (resSMA * ecc) * drawScale * (resAp > resPe ? 1 : -1);
    ctx.beginPath(); ctx.strokeStyle = '#f2cc60';
    ctx.ellipse(cX, cY + fOffset, Math.sqrt(resAp * resPe) * drawScale, resSMA * drawScale, 0, 0, Math.PI * 2); ctx.stroke();

    // Satellites & Chords
    const satCoords = [];
    for(let i=0; i<s; i++) {
        const ang = (i * 2 * Math.PI / s) - Math.PI/2;
        const x = cX + (smaT * drawScale) * Math.cos(ang), y = cY + (smaT * drawScale) * Math.sin(ang);
        satCoords.push({x, y});
    }
    ctx.strokeStyle = 'rgba(63, 185, 80, 0.3)'; ctx.beginPath();
    for(let i=0; i<s; i++) {
        ctx.moveTo(satCoords[i].x, satCoords[i].y);
        ctx.lineTo(satCoords[(i+1)%s].x, satCoords[(i+1)%s].y);
    }
    ctx.stroke();
    ctx.fillStyle = '#3fb950';
    satCoords.forEach(p => { ctx.beginPath(); ctx.arc(p.x, p.y, 4, 0, Math.PI*2); ctx.fill(); });
}

function formatT(s) {
    if (!s || isNaN(s)) return "0.00s | 0y 0d 0h 0m 0.00s";
    
    // Total raw seconds formatted
    const rawStr = s.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2}) + "s";
    
    // KSP Standard Time Conversion
    // 1 Year = 426 days = 9,201,600 seconds
    // 1 Day = 6 hours = 21,600 seconds
    const y = Math.floor(s / 9201600);
    const d = Math.floor((s % 9201600) / 21600);
    const h = Math.floor((s % 21600) / 3600);
    const m = Math.floor((s % 3600) / 60);
    const sec = (s % 60).toFixed(2);
    
    let fmt = "";
    if (y > 0) fmt += `${y}y `;
    if (y > 0 || d > 0) fmt += `${d}d `;
    if (y > 0 || d > 0 || h > 0) fmt += `${h}h `;
    if (y > 0 || d > 0 || h > 0 || m > 0) fmt += `${m}m `;
    fmt += `${sec}s`;
    
    return `${rawStr} | ${fmt}`;
}

window.onload = updateAll;
</script>
